name: publish-qc-formula

on:
  repository_dispatch:
    types:
      - qc_release_published

concurrency:
  group: publish-qc-formula
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      HOMEBREW_DEVELOPER: 1
      HOMEBREW_NO_INSTALL_FROM_API: 1
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Render qc formula
        run: |
          chmod +x Scripts/render-qc-formula.sh
          Scripts/render-qc-formula.sh \
            "${{ github.event.client_payload.version }}" \
            "${{ github.event.client_payload.sha256 }}" \
            "${{ github.event.client_payload.release_tag }}" \
            "${{ github.event.client_payload.app_repo }}" \
            "qc" \
            "${{ github.event.client_payload.asset_name }}"

      - name: Validate qc formula
        run: |
          chmod +x Scripts/validate-qc-formula.sh
          Scripts/validate-qc-formula.sh

      - name: Commit and push formula update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/qc.rb

          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          git commit -m "Update qc to ${{ github.event.client_payload.version }}"
          git pull --rebase origin main
          git push origin HEAD:main
